name: Relatorios Automaticos InHouse

on:
  schedule:
    # Roda todo dia às 12h UTC (9h BRT). Ajuste o horário se precisar.
    - cron: '0 12 * * *'
  workflow_dispatch:   # permite rodar manualmente pelo painel do GitHub Actions
    inputs:
      forcar_modo:
        description: 'Forçar modo (SEMANAL, MENSAL ou deixe vazio para calendário automático)'
        required: false
        default: ''

jobs:
  enviar-relatorios:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          pip install pymysql pandas openpyxl snowflake-connector-python cryptography

      - name: Escrever config.json
        run: |
          cat > config.json << 'EOF'
          {
            "mysql": {
              "host": "34.70.28.234",
              "user": "caique-cardoso-ro",
              "password": "RQeoRdcwTkvpX2Ee",
              "database": "neer_house_db"
            },
            "snowflake": {
              "account": "APUJIET-CIA48409",
              "user": "CAIQUECARDOSO",
              "warehouse": "COMPUTE_WH",
              "database": "INHOUSE_DW",
              "private_key_file": "rsa_key.pem"
            }
          }
          EOF

      - name: Escrever RSA key do Snowflake
        run: |
          echo "${{ secrets.SNOWFLAKE_RSA_KEY }}" > rsa_key.pem

      - name: Instalar OpenVPN
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y openvpn

      - name: Conectar na VPN
        run: |
          echo "${{ secrets.OVPN_CONFIG }}" > vpn.ovpn
          printf "caique-ihm-stg\n${{ secrets.OVPN_PASSWORD }}\n" > vpn-auth.txt
          sudo openvpn --config vpn.ovpn --auth-user-pass vpn-auth.txt --daemon --log /tmp/vpn.log
          sleep 10
          sudo cat /tmp/vpn.log | tail -10

      - name: Rodar robô de relatórios
        env:
          FORCAR_MODO: ${{ github.event.inputs.forcar_modo }}
        run: python relatorios_automaticos_v2.py
